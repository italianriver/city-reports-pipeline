<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Amsterdam Incident Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

  <style>
      #map { height: 100vh; width: 100%; }
  </style>
</head>
<body>

<div id="map"></div>

<script>
// ---------------------
// 1. INITIALISE MAP
// ---------------------
const map = L.map('map').setView([52.37, 4.89], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);

// ---------------------
// 2. URL TO YOUR AZURE GEOJSON
// ---------------------
const url = "https://<storage>.blob.core.windows.net/<container>/reports.geojson?<sas-token>";

// ---------------------
// 3. COLOR FUNCTION
// ---------------------
function getColor(priority) {
    if (!priority) return "#000000"; // fallback
    priority = priority.toLowerCase();
    if (priority === "hoog") return "#FF0000";    // red
    if (priority === "middel") return "#FFA500";  // orange
    if (priority === "laag") return "#FFD700";    // yellow
    return "#000000";
}

// ---------------------
// 4. LOAD + DISPLAY GEOJSON
// ---------------------
function loadData() {
    fetch(url + "&t=" + Date.now())  // timestamp prevents caching
        .then(r => r.json())
        .then(data => {

            // Remove previous layer if exists
            if (window.layer) {
                map.removeLayer(window.layer);
            }

            // Add new layer
            window.layer = L.geoJSON(data, {

                pointToLayer: function(feature, latlng) {
                    const color = getColor(feature.properties.priority);

                    return L.circleMarker(latlng, {
                        radius: 8,
                        fillColor: color,
                        color: "#000",
                        weight: 1,
                        opacity: 1,
                        fillOpacity: 0.8
                    });
                },

                onEachFeature: function(feature, layer) {
                    const p = feature.properties;

                    const popup = `<b>Probleem Nummer:</b> ${f.properties.id}<br>
                         <b>Probleem:</b> ${f.properties.problem}<br>
                         <b>Prioriteit:</b> ${f.properties.priority}<br>
                         <br>Straatnaam:</b> ${f.properties.street_name}<br>
                         <b>Huisnummer:</b> ${f.properties.house_number}<br>
                         <b>Postcode:</b> ${f.properties.postcode}<br>
                         <b>Datum Gemeld:</b> ${f.properties.reported_on}<br>`;

                    layer.bindPopup(popup);
                }

            }).addTo(map);
        });
}

// First load
loadData();

// Refresh every 3 hours
setInterval(loadData, 3 * 60 * 60 * 1000);

</script>

</body>
</html>
