<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Amsterdam Incident Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
  <style>
      #map { height: 100vh; width: 100%; }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

<script>

// Leaflet map
const map = L.map('map').setView([52.37, 4.89], 12);

// Base tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);

// Load Azure GeoJSON
const url = "https://storagegemeente.blob.core.windows.net/consumption/reports.geojson?sp=r&st=2025-12-11T18:05:18Z&se=2025-12-12T02:20:18Z&spr=https&sv=2024-11-04&sr=b&sig=whi6o8Bl%2ByhRMQAB6t97tvcst7PHgD%2FiPoprOocoA7Y%3D";

function getColor(priority) {
    if (!priority) return "#000000"; // fallback
    priority = priority.toLowerCase();
    if (priority === "hoog") return "#FF0000";    // red
    if (priority === "middel") return "#FFA500";  // orange
    if (priority === "laag") return "#FFD700";    // yellow
    return "#000000";
}
// Refresh function
function loadData() {
    fetch(url + "&t=" + Date.now()) // timestamp to break cache
        .then(r => r.json())
        .then(data => {
            if (window.layer) map.removeLayer(window.layer);

            window.layer = L.geoJSON(data, {
                onEachFeature: (f, layer) => {
                    layer.bindPopup(
                        `<b>Probleem Nummer:</b> ${f.properties.id}<br>
                         <b>Probleem:</b> ${f.properties.problem}<br>
                         <b>Prioriteit:</b> ${f.properties.priority}<br>
                          <br>Straatnaam:</b> ${f.properties.street_name}<br>
                         <b>Huisnummer:</b> ${f.properties.house_number}<br>
                         <b>Postcode:</b> ${f.properties.postcode}<br>
                         <b>Datum Gemeld:</b> ${f.properties.reported_on}<br>`
                    );
                }
            }).addTo(map);
        });
}

loadData();

// Refresh every 3 hours
setInterval(loadData, 3 * 60 * 60 * 1000);

</script>

</body>
</html>
